# Render deployment configuration for FreshSip
# This file defines the web service and database for Render

services:
  # Web Service
  - type: web
    name: freshsip
    runtime: node
    region: singapore # Closest to India for low latency
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: freshsip-db
          property: connectionString
      # Add these in Render Dashboard manually:
      # - RAZORPAY_KEY_ID
      # - RAZORPAY_KEY_SECRET
      # - RAZORPAY_WEBHOOK_SECRET
      # - VITE_RAZORPAY_KEY_ID
      # - OWNER_OPEN_ID (your admin Google ID)

databases:
  # PostgreSQL Database (Free for 90 days)
  - name: freshsip-db
    plan: free
    region: singapore
    databaseName: freshsip
    user: freshsip_user
